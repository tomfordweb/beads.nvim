name: zizmor

on:
  push:
    branches: [main]
  pull_request:

# Static analysis of the workflows themselves: catches unpinned actions,
# over-broad permissions, and dangerous triggers before they ship.
permissions:
  contents: read

jobs:
  zizmor:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.x"

      - name: Install zizmor
        run: pip install zizmor==1.25.2

      - name: Lint workflows
        # Offline mode: no GITHUB_TOKEN needed, no audits that call the network.
        run: zizmor --offline .github/workflows/

name: test

on:
  push:
    branches: [main]
  pull_request:

# Least privilege: the test workflow only reads the repo.
permissions:
  contents: read

jobs:
  test:
    name: nvim ${{ matrix.nvim }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        nvim: [stable, nightly]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false

      - name: Install Neovim
        uses: rhysd/action-setup-vim@febef33995d6649302e9d88dda81e071b68f16a7 # v1.6.1
        with:
          neovim: true
          version: ${{ matrix.nvim }}

      - name: Check out plenary.nvim
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false
          repository: nvim-lua/plenary.nvim
          path: .deps/plenary.nvim

      - name: Check out telescope.nvim
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false
          repository: nvim-telescope/telescope.nvim
          path: .deps/telescope.nvim

      # bd is best-effort: when present the integration suite runs, otherwise it
      # self-skips (see tests/integration_spec.lua). Never fail the job on this.
      - name: Install bd (beads) — best effort
        continue-on-error: true
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
        with:
          go-version: stable

      - name: go install bd — best effort
        continue-on-error: true
        run: |
          go install github.com/gastownhall/beads/cmd/bd@v1.0.4 \
            || go install github.com/gastownhall/beads@v1.0.4 \
            || echo "bd install skipped; integration suite will be skipped"
          echo "$HOME/go/bin" >> "$GITHUB_PATH"

      - name: Run tests
        env:
          PLENARY_DIR: ${{ github.workspace }}/.deps/plenary.nvim
          TELESCOPE_DIR: ${{ github.workspace }}/.deps/telescope.nvim
        run: |
          nvim --headless --noplugin -u tests/minimal_init.lua \
            -c "PlenaryBustedDirectory tests/ {minimal_init = 'tests/minimal_init.lua', sequential = true}" \
            2>&1 | tee /tmp/test.out
          # PlenaryBustedDirectory exits 0 even on failure; grep the report.
          if grep -qE "Failed : *[1-9]|Errors : *[1-9]" /tmp/test.out; then
            echo "::error::test failures detected"
            exit 1
          fi

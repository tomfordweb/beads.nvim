name: docs

on:
  push:
    branches: [main]
  pull_request:

# Least privilege at the top level: read-only. The deploy job escalates to the
# Pages-specific scopes it needs (and nothing more). Note: there is deliberately
# NO `contents: write` anywhere — the docs job never commits or pushes.
permissions:
  contents: read

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  # Generate :help beads from README.md (single source) via panvimdoc, then
  # FAIL if the committed doc/beads.txt is stale. Contributors regenerate and
  # commit doc/beads.txt themselves in their PR — this job never auto-commits.
  vimdoc:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false

      - name: Generate vimdoc
        uses: kdheepak/panvimdoc@662fb20304d20c539fb48a0bda628f5165507de7 # v4.0.1
        with:
          vimdoc: beads
          input: README.md
          description: "Neovim UI for the bd issue tracker"
          titledatepattern: "%Y"
          demojify: true
          # treesitter: panvimdoc help-syntax highlighting only — NOT a runtime
          # dependency of the plugin.
          treesitter: true

      - name: Fail on stale doc
        run: |
          if ! git diff --quiet -- doc/beads.txt; then
            echo "::error::doc/beads.txt is out of date — run panvimdoc and commit the result."
            git diff -- doc/beads.txt
            exit 1
          fi

  # Build + deploy the GitHub Pages site (readthedocs theme) from the same
  # README source. Only deploys on push to main.
  pages:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.x"

      - name: Install mkdocs
        run: pip install mkdocs==1.6.1

      - name: Stage README as the docs index (single source)
        run: |
          mkdir -p docs
          cp README.md docs/index.md
          # The README leads with assets/demo.gif (repo-root-relative); copy the
          # asset alongside the staged index so mkdocs --strict resolves it.
          cp -r assets docs/assets

      - name: Build site
        run: mkdocs build --strict

      - name: Upload Pages artifact
        if: github.event_name == 'push'
        uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa # v3.0.1
        with:
          path: site

  deploy:
    needs: pages
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    # Only this job gets the Pages-deploy scopes (OIDC). No contents:write.
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4.0.5

site_name: beads.nvim
site_description: Neovim UI for the bd issue tracker
site_url: https://tomfordweb.github.io/beads.nvim/
repo_url: https://github.com/tomfordweb/beads.nvim
repo_name: tomfordweb/beads.nvim

# Deliberately minimal: the README is the single source, copied to
# docs/index.md by the docs workflow. docs/ is gitignored.
docs_dir: docs

theme:
  name: readthedocs

markdown_extensions:
  - admonition
  - toc:
      permalink: true
  - fenced_code

nav:
  - Home: index.md
